version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'True'
    # Packages required by the batch ingest tasks and dbt
    _PIP_ADDITIONAL_REQUIREMENTS: 'boto3 pandas pyarrow psycopg2-binary dbt-postgres dbt-core'
    # Env vars forwarded to PythonOperator tasks
    S3_ENDPOINT: http://minio:9000
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    S3_BUCKET: finpulse
    POSTGRES_HOST: postgres
    POSTGRES_PORT: '5432'
    POSTGRES_DB: finpulse
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
  volumes:
    - ./batch/dags:/opt/airflow/dags
    - ./batch/ingest:/opt/airflow/dags/ingest
    - ./warehouse/dbt_project:/opt/airflow/dbt
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # Infrastructure: Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      # Runs on first boot: creates the 'finpulse' database and schema
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Infrastructure: Kafka + Zookeeper
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      # Wait until Kafka is ready to accept connections
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Section 1: Synthetic transaction generator
  # ---------------------------------------------------------------------------
  generator:
    build: ./generator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      # Mount the pre-processed Parquet seed (run scripts/convert_paysim.py first)
      - ./generator/paysim_seed:/data
    environment:
      KAFKA_BROKER: kafka:29092
      PAYSIM_PARQUET_PATH: /data/paysim_seed.parquet
      FRAUD_PROB: "0.05"
      NUM_ACCOUNTS: "1000"
      SLEEP_MIN: "0.1"
      SLEEP_MAX: "1.5"
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Dev tool: Kafka UI — browse topics and inspect messages at localhost:8090
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finpulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Section 2: MinIO — S3-compatible raw lake (bronze layer)
  # Console UI at http://localhost:9001  (admin / minioadmin)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot container: creates the 'finpulse' bucket on first boot
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/finpulse;
        echo 'Bucket finpulse ready.';
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Section 2: Spark Structured Streaming fraud detector
  # ---------------------------------------------------------------------------
  spark-fraud-detector:
    build: ./streaming
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: transactions.raw
      POSTGRES_URL: jdbc:postgresql://postgres:5432/finpulse
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      RAW_S3_PATH: s3a://finpulse/raw/
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Airflow
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Superset — BI Dashboard
  # ---------------------------------------------------------------------------
  superset-init:
    image: apache/superset:3.1.0
    container_name: finpulse-pipeline-superset-init-1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: 'finpulse-demo-secret-key-change-in-prod'
      DATABASE_URL: 'postgresql+psycopg2://airflow:airflow@postgres/airflow'
    volumes:
      - superset-home:/app/superset_home
      - ./dashboards/superset_init.sh:/docker-entrypoint-initdb.d/superset_init.sh
    command: >
      bash -c "
        pip install psycopg2-binary --quiet &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@finpulse.io --password admin 2>/dev/null || true &&
        superset init
      "
    restart: on-failure

  superset:
    image: apache/superset:3.1.0
    container_name: finpulse-pipeline-superset-1
    ports:
      - '8088:8088'
    depends_on:
      - superset-init
      - postgres
    environment:
      SUPERSET_SECRET_KEY: 'finpulse-demo-secret-key-change-in-prod'
      DATABASE_URL: 'postgresql+psycopg2://airflow:airflow@postgres/airflow'
    volumes:
      - superset-home:/app/superset_home
    command: superset run -p 8088 --with-threads --reload --debugger
    restart: unless-stopped

volumes:
  postgres-db-volume:
  minio-data:
  superset-home:
